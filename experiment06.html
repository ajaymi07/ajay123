<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        #pa {
            border: 2px solid black;
            padding: 10px;

        }

        .a {
            background-color: black;
            color: white;
            text-align: center;
            height: 45px;
            margin-top: 20px;
        }

        .a h1 {
            margin: 0;
            font-size: 28px;
        }

        h3 {
            color: green;
        }

        .b {
            width: 200px;
            margin: 30px auto;
            padding: 15px;
            border-radius: 7px;
            background-color: white;
            box-shadow: 0px 0px 8px grey;

        }

        .b img {
            width: 100%;
            max-width: 250px;
            border-radius: 5px;
        }

        .add {
            text-align: center;
            color: white;
            background-color: rgb(62, 176, 221);
            height: 25px;
            padding: 10px;
            font-size: 19px;

        }

        .old-price {
            color: #777;
            text-decoration: line-through;
            font-weight: normal;
        }

        .price {
            margin: 8px 0 14px;
            font-size: 20px;
            color: green;
            font-weight: bold;
        }
    </style>
    <title>Shop</title>
</head>

<body>
    <div id="pa">
        <div class="a">
            <h1>ShopEasy</h1>
        </div>
        <div class="b">
            <img src="tshirt.png" alt="">

            <h2>Classic Cotton T-shirt</h2>
            <p>Soft, breathable cotton. Regular fit. Available in multiple colors.</p>
            <div class="price">
                ₹499 <span class="old-price">₹1012</span>
            </div>
            <div class="add">
                Add to cart
            </div>
        </div>
    </div>
</body>

</html>
